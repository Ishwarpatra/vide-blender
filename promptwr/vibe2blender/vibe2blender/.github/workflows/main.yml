name: Vibe2Blender CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # Node 24 required: Wasp framework hard dependency (>=24.14.1)
        node-version: '24'
        cache: 'npm'

    - name: Install Node Dependencies
      run: npm ci

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Ruff Linter
      run: pip install ruff

    - name: Lint Python Code
      run: ruff check .

    - name: Wasp Build Test
      run: npx wasp build

    - name: Docker Build Test (main services)
      run: docker-compose -f infrastructure/docker-compose.yml build

    - name: Docker Build Test (blender-executor sandbox)
      run: docker build -f infrastructure/Dockerfile.blender-executor -t blender-executor:ci .
