# ──────────────────────────────────────────────────────────────────────
# SECURITY: All secrets are injected at runtime via an external env_file
# (.env.server). They are NEVER baked into the Docker image layers.
# This file (.env.server) must NEVER be committed to version control.
# For CI/CD, inject secrets via the pipeline's secret manager instead.
# ──────────────────────────────────────────────────────────────────────
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    # All POSTGRES_* variables are sourced from ../.env.server at runtime.
    # Required keys: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    env_file:
      - ../.env.server
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - v2b-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - v2b-network

  backend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    # All secrets (GEMINI_API_KEY, DATABASE_URL, WASP_AUTH_TOKEN_SECRET,
    # GEMINI_CACHE_NAME, OLLAMA_HOST, OLLAMA_MODEL) are injected at runtime.
    # The Docker IMAGE contains ZERO hardcoded credentials.
    env_file:
      - ../.env.server
    environment:
      # Sandbox executor configuration — points to shared host volumes
      BLENDER_EXECUTOR_IMAGE: blender-executor:latest
      SANDBOX_SCRIPTS_DIR: /tmp/v2b-scripts
      SANDBOX_OUTPUTS_DIR: /tmp/v2b-outputs
      SANDBOX_TIMEOUT_MS: "120000"
    volumes:
      # Docker socket: allows the backend to spawn ephemeral blender-executor
      # containers on the host. This is required for the sandbox pipeline.
      # Security note: the spawned containers run with --network none and
      # strict resource limits enforced by sandboxExecutor.ts.
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared volumes between backend and blender-executor containers.
      # The backend writes scripts here; the executor reads and writes GLBs.
      - v2b-scripts:/tmp/v2b-scripts
      - v2b-outputs:/tmp/v2b-outputs
    networks:
      - v2b-network
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - v2b-network

networks:
  v2b-network:
    driver: bridge

volumes:
  pgdata:
  ollama_models:
  # Shared ephemeral volumes for the sandbox pipeline
  v2b-scripts:
  v2b-outputs:
